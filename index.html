<script>
const SHEETS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxqAi3rkNu9WQqYXXeZUiSap-hd8sj1jv6EayOxx_edz2KmatJkk4Gm6ESden-pAngY9w/exec';

const form = document.getElementById('rfqForm');
const statusText = document.getElementById('statusText');

function toNumber(value){
  const num = parseFloat(value);
  return isNaN(num) ? 0 : num;
}

function formatMoney(value){
  return `${toNumber(value).toLocaleString('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })} AED`;
}

function getLiftTypes(){
  return [...document.querySelectorAll('input[name="liftType"]:checked')]
    .map(el => el.value)
    .join(' / ');
}

function getFormData(){
  return {
    requestDate: document.getElementById('requestDate').value,
    salesRepresentative: form.elements['salesRepresentative'].value,
    liftType: getLiftTypes(),
    clientName: form.elements['clientName'].value,
    phone1: form.elements['phone1'].value,
    phone2: form.elements['phone2'].value,
    consultantOfficeName: form.elements['consultantOfficeName'].value,
    contractorOfficeName: form.elements['contractorOfficeName'].value,
    capacity: form.elements['capacity'].value,
    numberOfStops: form.elements['numberOfStops'].value,
    shaftWidth: form.elements['shaftWidth'].value,
    shaftDepth: form.elements['shaftDepth'].value,
    pitDepth: form.elements['pitDepth'].value,
    topFloorHeight: form.elements['topFloorHeight'].value,
    finalItalianPrice: document.getElementById('finalItalianPrice').value,
    finalFujiPrice: document.getElementById('finalFujiPrice').value
  };
}

async function saveToGoogleSheet() {
  const data = getFormData();

  try {
    const response = await fetch(SHEETS_WEBAPP_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (!result.success) {
      throw new Error(result.message || 'فشل الحفظ');
    }

    return result;

  } catch (error) {
    throw new Error('خطأ في الاتصال: ' + error.message);
  }
}

async function handleSubmit(){
  try{
    statusText.textContent = 'جاري حفظ البيانات...';
    statusText.className = 'status';

    await saveToGoogleSheet();

    statusText.textContent = 'تم حفظ البيانات بنجاح ✅';
    statusText.className = 'status ok';

  } catch (err){
    statusText.textContent = err.message;
    statusText.className = 'status error';
  }
}

document.getElementById('autoSendBtn').addEventListener('click', handleSubmit);
document.getElementById('pdfOnlyBtn').addEventListener('click', handleSubmit);

</script>
